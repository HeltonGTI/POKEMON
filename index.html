<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>App Pokémon</title>
  <link rel="stylesheet" href="css/estilo.css">
</head>

<body>

  <div class="container">
    <div class="header">
  <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" alt="Pokemon Logo">
  <h1>🔍Buscar Pokémon </h1>
</div>

    <form id="form">
      <input type="text" id="pokemonInput" placeholder="Digite o nome ou o número do Pokémon">
      <button type="submit" class="pokebola-btn">
  <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="Buscar">
</button>
    </form>

    <p id="erro"></p>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Imagem</th>
          <th>Tipo</th>
          <th>Peso</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>

  <script src="js/script.js"></script>
</body>
<div id="modalConfirmacao" class="modal">
  <div class="modal-content">
    <p>Tem certeza que deseja excluir este Pokémon?</p>
    <div class="modal-buttons">
      <button id="confirmarExclusao">Sim</button>
      <button id="cancelarExclusao">Cancelar</button>
    </div>
  </div>
</div>
</html>
